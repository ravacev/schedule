{% extends 'base/base.html' %}
{% block title %} {{ title }} {% endblock %}

{% block content %}
	<section class="ftco-section">
		
		<div class="container">
			<div class="row">
				<div class="col-md-12">
					<!-- <h4 class="text-center mb-4">OFS Red</h4> -->
					<link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">

					<div class="table-wrap">

						<table class="table">
						<thead class="thead-primary">
						<!--Aqui se imprime el titulo de la agenda-->
						<tr>
							{% for f in headers %}
								<th>{{ f }}</th>
							{% endfor %}
						</tr>
						</thead>    
						<tbody>
						
						<!--Macro de _macro para imprimir la cantidad de N veces el registro de la agenda-->
						{% from '_macro.html' import show_table %}
									
						{{ show_table(result, row, column) }}
					</table>
					</div>

				</div>
			</div>
		</div>
		
		<footer style="position: relative;">
			<div class="container">
				<div class="row">
					<p class="copyright text-muted">&copy; Desarrollado por Nicolas Ravetti</p>
				</div>
			</div>
		</footer>

	</section>

	<script src="../static/js/jquery.min.js"></script>
	<script src="../static/js/popper.js"></script>
	<script src="../static/js/bootstrap.min.js"></script>
	<script src="../static/js/main.js"></script>
{% endblock %}
